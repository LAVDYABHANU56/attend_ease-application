<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendEase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #161b22;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #58a6ff;
            font-size: 2rem;
        }

        .logo p {
            color: #8b949e;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #8b949e;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #58a6ff;
        }

        select option {
            background: #0d1117;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #58a6ff;
            color: #0d1117;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #79b8ff;
        }

        .toggle {
            text-align: center;
            margin-top: 20px;
            color: #8b949e;
            font-size: 0.9rem;
        }

        .toggle span {
            color: #58a6ff;
            cursor: pointer;
        }

        .error {
            color: #f85149;
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid #30363d;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            color: #8b949e;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .tab.active {
            color: #58a6ff;
            border-bottom: 2px solid #58a6ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>AttendEase</h1>
            <p>Attendance. Made Effortless.</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Login</div>
            <div class="tab" onclick="showTab('register')">Register</div>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" />
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="loginRole">
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                </select>
            </div>
            <button class="btn" onclick="login()">Login</button>
            <div class="error" id="loginError"></div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display:none">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Enter your name" />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="Enter your email" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Enter your password" />
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="regRole">
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                </select>
            </div>
            <button class="btn" onclick="register()">Register</button>
            <div class="error" id="registerError"></div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8000";

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
                document.querySelectorAll('.tab')[0].classList.add('active');
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                document.querySelectorAll('.tab')[1].classList.add('active');
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const role = document.getElementById('loginRole').value;

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    document.getElementById('loginError').textContent = data.detail;
                    return;
                }

                // Save token and user info
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('name', data.name);

                // Redirect based on role
                if (data.role === 'faculty') {
                    window.location.href = 'faculty.html';
                } else {
                    window.location.href = 'student.html';
                }

            } catch (err) {
                document.getElementById('loginError').textContent = 'Server error. Is backend running?';
            }
        }

        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;

            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });
                const data = await res.json();

                if (!res.ok) {
                    document.getElementById('registerError').textContent = data.detail;
                    return;
                }

                alert('Registered successfully! Please login.');
                showTab('login');

            } catch (err) {
                document.getElementById('registerError').textContent = 'Server error. Is backend running?';
            }
        }
    </script>
</body>
</html>
